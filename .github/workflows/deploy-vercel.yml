name: Deploy to Vercel

# Triggers on every push to main, and can be run manually.
#
# Required GitHub Secrets (repo Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       – Vercel personal access token
#   VERCEL_ORG_ID      – Your Vercel account/team ID
#   VERCEL_PROJECT_ID  – The project's prj_... ID
#
# To get VERCEL_ORG_ID and VERCEL_PROJECT_ID, run in your own terminal:
#   npx vercel login
#   npx vercel link          # choose exam-verify-system-yv8p when prompted
#   cat .vercel/project.json  # copy orgId → VERCEL_ORG_ID, projectId → VERCEL_PROJECT_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy to Vercel

    # VERCEL_TOKEN is set at job level so the CLI picks it up automatically
    # (no --token flag needed; Vercel CLI reads VERCEL_TOKEN from env natively)
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    defaults:
      run:
        working-directory: exam-verify-system

    steps:
      - name: Verify required secrets are set
        run: |
          MISSING=""
          [ -z "${{ secrets.VERCEL_TOKEN }}" ]      && MISSING="$MISSING VERCEL_TOKEN"
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ]     && MISSING="$MISSING VERCEL_ORG_ID"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && MISSING="$MISSING VERCEL_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "✗ Missing GitHub Secrets:$MISSING"
            echo "Add them at: GitHub repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ All secrets present"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-verify-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' \
            "${{ secrets.VERCEL_ORG_ID }}" \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            > .vercel/project.json
          echo "✓ .vercel/project.json written"

      - name: Pull Vercel environment & project config
        run: vercel pull --yes --environment=production

      - name: Build project
        run: vercel build --prod

      - name: Deploy to Vercel (production)
        run: |
          URL=$(vercel deploy --prebuilt --prod)
          echo "Deployed to: $URL"
