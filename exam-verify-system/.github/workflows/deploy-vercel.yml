name: Deploy to Vercel

# Runs automatically on every push to main, and can be triggered manually.
# Required GitHub Secrets:
#   VERCEL_TOKEN       - Vercel personal access token (Settings → Tokens)
#   VERCEL_ORG_ID      - Your Vercel user/team ID  (run: vercel whoami --token <tok>)
#   VERCEL_PROJECT_ID  - Vercel project ID          (run: vercel projects ls --token <tok>)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy to Vercel

    defaults:
      run:
        working-directory: exam-verify-system

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-verify-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment & project config
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build project
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel (production)
        run: |
          URL=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "Deployed to: $URL"
